name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "**" ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: false

    - name: Install golangci-lint
      run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

    - name: Run golangci-lint
      run: golangci-lint run

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache: false

    - name: Test
      run: go test ./pkg/... -coverprofile=./cover.out

    - name: Install govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: Dependency audit
      run: |
        govulncheck -json ./... | python3 - <<'EOF'
        import sys, json

        decoder = json.JSONDecoder()
        buf = ''
        non_stdlib = []

        for line in sys.stdin:
            buf += line
            buf = buf.strip()
            while buf:
                try:
                    obj, idx = decoder.raw_decode(buf)
                    buf = buf[idx:].strip()
                    if 'finding' in obj:
                        trace = obj['finding'].get('trace', [])
                        if trace and trace[0].get('module') != 'stdlib':
                            non_stdlib.append(obj['finding'].get('osv'))
                except json.JSONDecodeError:
                    break

        if non_stdlib:
            print('Non-stdlib vulnerabilities found:', non_stdlib)
            sys.exit(1)
        print('No non-stdlib vulnerabilities found (stdlib vulns require Go upgrade)')
        EOF
